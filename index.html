<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 智能配單助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 AI 智能配單助手</h1>
        <div id="chat-messages">
            <div class="message ai"><strong>AI 助手:</strong> 您好！我是您的專屬電腦組裝顧問。請告訴我您的預算與用途？</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="例如：預算 35000，要玩黑神話悟空...">
            <button id="send-btn">送出諮詢</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
