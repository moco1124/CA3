<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 電腦組裝推薦平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">AI 電腦組裝推薦平台</div>
        <nav>
            <a href="#">首頁</a>
            <a href="#">配單工具</a>
            <a href="#">零件資訊</a>
        </nav>
    </header>

    <main>
        <section class="ai-container">
            <div class="ai-header">
                <h2>🤖 AI 智能配單助手</h2>
                <p>告訴我您的預算、用途（遊戲/剪片）或偏好品牌，我將為您規劃配置。</p>
            </div>

            <div id="chat-box" class="chat-box">
                <div id="chat-messages">
                    <div class="message ai">
                        <strong>AI 助手:</strong> 您好！我是您的專屬電腦組裝顧問。請問今天有什麼可以幫您的？
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="例如：我預算 35000，要玩黑神話悟空...">
                <button id="send-btn" onclick="askAIAssistant()">送出諮詢</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AI 電腦組裝推薦平台 - 專題製作</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
